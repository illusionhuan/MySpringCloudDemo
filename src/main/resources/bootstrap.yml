spring:
  cloud:
    nacos:
      # Nacos 服务器地址
      server-addr: localhost:8848
      # Nacos 命名空间（默认使用 public）
      namespace: public
      # Nacos 分组
      group: DEFAULT_GROUP
      # 用户名/密码（Nacos 2.x 默认）
      username: nacos
      password: nacos
      config:
        # 配置文件扩展名
        file-extension: yml
        # 共享配置
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        # 服务分组
        group: DEFAULT_GROUP
        # 注册为临时实例
        ephemeral: true
